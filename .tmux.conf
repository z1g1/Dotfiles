bind-key \\ split-window -h -c '#{pane_current_path}'

# switch panes using Alt-hjkl (vim arrows) without prefix
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# Enable Mouse Mode if you need it 
set -g mouse on

# reload config file 
bind r source-file ~/.tmux.conf

# ---------------------------------------------------------
# Project-aware tmux config
# ---------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Show pane borders — the divider between split panes will be colored
set -g pane-border-lines heavy

# Pane border status on top gives a colored line across the top of each pane
set -g pane-border-status top
set -g pane-border-format ""

# When switching windows, read the stored project color and apply it
# This fires IMMEDIATELY on window switch — no waiting for a prompt
set-hook -g after-select-window {
  run-shell '
    color=$(tmux show -wv @project_color 2>/dev/null);
    if [ -n "$color" ]; then
      tmux set status-style "bg=$color,fg=black";
      tmux set pane-border-style "fg=$color";
      tmux set pane-active-border-style "fg=$color";
    else
      tmux set status-style "bg=green,fg=black";
      tmux set pane-border-style "fg=default";
      tmux set pane-active-border-style "fg=green";
    fi
  '
}

